# Entropy — Production Deployment
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: entropy
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    command: uvicorn entropy.api.main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres/entropy
      REDIS_URL: redis://redis:6379

  celery:
    build: .
    restart: always
    command: celery -A entropy.tasks.celery_app worker --beat -l info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres/entropy
      REDIS_URL: redis://redis:6379

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./dashboard/dist:/usr/share/nginx/html
      - certbot_certs:/etc/letsencrypt
    depends_on:
      - api

volumes:
  postgres_data:
  certbot_certs:
